name: Publish npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    name: publish-npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Resolve release version from tag
        id: release-meta
        shell: bash
        run: |
          set -euo pipefail
          release_tag="${GITHUB_REF_NAME}"
          release_version="${release_tag#v}"
          is_prerelease=false
          npm_dist_tag="latest"
          if [[ "${release_version}" == *-* ]]; then
            is_prerelease=true
            prerelease_suffix="${release_version#*-}"
            npm_dist_tag="${prerelease_suffix%%.*}"
            npm_dist_tag="${npm_dist_tag,,}"
            if [[ -z "${npm_dist_tag}" || "${npm_dist_tag}" =~ ^[0-9]+$ ]]; then
              npm_dist_tag="next"
            fi
          fi
          echo "release_version=${release_version}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${is_prerelease}" >> "$GITHUB_OUTPUT"
          echo "npm_dist_tag=${npm_dist_tag}" >> "$GITHUB_OUTPUT"

      - name: Apply tag-derived release version
        run: python scripts/apply-release-version.py --version "${{ steps.release-meta.outputs.release_version }}"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Run automated tests
        run: python -m unittest discover -s skills/libro-wcag/scripts/tests -p "test_*.py"

      - name: Validate repo skill contract
        run: python scripts/validate_skill.py skills/libro-wcag --validate-policy-bundles

      - name: Export provenance inputs
        shell: bash
        run: |
          set -euo pipefail
          echo "LIBRO_AGENTWCAG_SOURCE_REVISION=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "LIBRO_AGENTWCAG_BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Dry run npm pack
        run: npm pack --dry-run

      - name: Pack npm tarball
        run: npm pack

      - name: Publish stable to npm with OIDC
        if: steps.release-meta.outputs.is_prerelease != 'true'
        run: npm publish --access public

      - name: Publish pre-release to npm with OIDC
        if: steps.release-meta.outputs.is_prerelease == 'true'
        run: npm publish --access public --tag "${{ steps.release-meta.outputs.npm_dist_tag }}"
