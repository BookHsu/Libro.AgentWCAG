name: Install Libro.AgentWCAG

on:
  workflow_call:
    inputs:
      agent:
        description: "codex | claude | gemini | copilot | all"
        required: true
        type: string
      version:
        description: "Git ref to install from"
        required: false
        type: string
        default: "master"
      dest:
        description: "Custom installation path"
        required: false
        type: string
        default: ""
      force:
        description: "Replace an existing installation"
        required: false
        type: boolean
        default: false
    outputs:
      installation_valid:
        description: "Whether doctor-agent verification succeeded"
        value: ${{ jobs.install.outputs.installation_valid }}

jobs:
  install:
    runs-on: ubuntu-latest
    outputs:
      installation_valid: ${{ steps.verify.outputs.installation_valid }}
    steps:
      - name: Checkout Libro.AgentWCAG
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ inputs.version }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install skill
        shell: bash
        run: |
          set -euo pipefail
          args=(--agent "${{ inputs.agent }}")
          if [[ -n "${{ inputs.dest }}" ]]; then
            args+=(--dest "${{ inputs.dest }}")
          fi
          if [[ "${{ inputs.force }}" == "true" ]]; then
            args+=(--force)
          fi
          python scripts/install-agent.py "${args[@]}"

      - name: Verify installation
        id: verify
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          args=(--agent "${{ inputs.agent }}" --verify-manifest-integrity)
          if [[ -n "${{ inputs.dest }}" ]]; then
            args+=(--dest "${{ inputs.dest }}")
          fi
          if python scripts/doctor-agent.py "${args[@]}"; then
            echo "installation_valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "installation_valid=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Fail when installation verification did not pass
        if: steps.verify.outputs.installation_valid != 'true'
        shell: bash
        run: |
          echo "Installation verification failed." >&2
          exit 1
